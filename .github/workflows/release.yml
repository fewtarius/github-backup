name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release & Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --outdir dist .

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/*.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew Tap
        uses: mislav/update-homebrew-formula-action@v2
        with:
          formula-name: github_backup
          formula-path: homebrew/Formula/github_backup.rb
          homebrew-tap: fewtarius/homebrew-tap
          version: ${{ env.VERSION }}
          sha256: ${{ env.sha256 }}
        env:
          COMMITTER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
